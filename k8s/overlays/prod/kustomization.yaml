apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization
commonLabels:
  env: prod
resources:
  - ../../base
  - configmap.yaml
namePrefix: prod-
patches:
  - target:
      kind: Deployment
      name: node-app-deployment
    patch: |-
      - op: replace
        path: /spec/replicas
        value: 3
  - target:
      kind: Service
      name: node-app-service
    patch: |-
      - op: replace
        path: /spec/ports/0/nodePort
        value: 30082

